<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TERMINAL // SISTEMA SEGURO</title>

<!-- ══════════════════════════════════════════════════════════
     CONFIGURAÇÃO — editar aqui para reutilizar noutras atividades
     passwords: lista de passwords aceites (case-insensitive)
     resposta:  texto mostrado linha a linha após password correta
     sistema:   nome do sistema mostrado no boot
     versao:    versão do sistema
     boot_msgs: mensagens de arranque (podem ser editadas)
══════════════════════════════════════════════════════════ -->
<script id="config" type="application/json">
{
  "sistema":  "ARCHIVUM // SISTEMA DE RECUPERAÇÃO DE DADOS",
  "versao":   "v2.3.1 — 1987",
  "passwords": ["LIDADOR", "lidador"],
  "resposta": [
    "AUTENTICAÇÃO CONFIRMADA.",
    "DESENCRIPTANDO ARQUIVO... ████████████████ 100%",
    "",
    "MENSAGEM DE SOEIRO MENDES DA MAIA — 1087 d.C.",
    "─────────────────────────────────────────────",
    "",
    "A minha terra não é a que se vê nos mapas.",
    "É a que se carrega dentro de quem a defende.",
    "",
    "O vosso legado foi encontrado.",
    "Sois agora guardiões do que ficou escondido.",
    "",
    "─────────────────────────────────────────────",
    "COORDENADAS DA CACHE: N 41° 13.847  W 008° 37.291",
    "",
    "▶  Dirija-se ao local indicado.",
    "▶  Assine o logbook.",
    "▶  Bem-vindo à rede de geocaching.",
    "",
    "[ ARQUIVO FECHADO — SESSÃO TERMINADA ]"
  ],
  "erro_msgs": [
    "ACESSO NEGADO.",
    "CÓDIGO INVÁLIDO. TENTE NOVAMENTE."
  ],
  "boot_msgs": [
    "ARCHIVUM SECURE TERMINAL  //  BIOS v1.4",
    "RAM: 64K OK",
    "VERIFICANDO INTEGRIDADE DO ARQUIVO...",
    "ARQUIVO ENCRIPTADO DETETADO.",
    "PROTOCOLO DE AUTENTICAÇÃO INICIADO.",
    ""
  ],
  "prompt_label": "CÓDIGO DE ACESSO",
  "input_mode": "password"
}
</script>

<style>
  /* ── RESET & BASE ── */
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --green:      #33ff33;
    --green-dim:  #1a8c1a;
    --green-glow: rgba(51,255,51,0.18);
    --green-faint:#0d420d;
    --bg:         #050905;
    --scanline:   rgba(0,0,0,0.35);
    --amber:      #ffb000;
  }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', Courier, monospace;
  }

  /* ── CRT MONITOR SHELL ── */
  .monitor {
    position: relative;
    width: min(860px, 96vw);
    background: #1a1a1a;
    border-radius: 18px 18px 22px 22px;
    padding: 10px;
    box-shadow:
      0 0 0 2px #333,
      0 0 0 5px #222,
      0 8px 40px rgba(0,0,0,0.9),
      inset 0 1px 0 rgba(255,255,255,0.07);
  }

  /* ── BEZEL ── */
  .bezel {
    background: radial-gradient(ellipse at 50% 0%, #2a2a2a, #111);
    border-radius: 12px 12px 16px 16px;
    padding: 24px 24px 20px;
    border: 1px solid #333;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
  }

  /* ── SCREEN ── */
  .screen {
    position: relative;
    background: var(--bg);
    border-radius: 6px;
    overflow: hidden;
    min-height: 480px;
    max-height: 70vh;
    border: 2px solid #111;
    box-shadow:
      inset 0 0 80px rgba(0,0,0,0.6),
      inset 0 0 20px var(--green-faint),
      0 0 20px var(--green-glow),
      0 0 60px rgba(51,255,51,0.04);
    display: flex;
    flex-direction: column;
  }

  /* ── PHOSPHOR GLOW OVERLAY ── */
  .screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(
      ellipse 90% 80% at 50% 40%,
      rgba(51,255,51,0.03) 0%,
      transparent 70%
    );
    pointer-events: none;
    z-index: 3;
  }

  /* ── SCANLINES ── */
  .screen::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      var(--scanline) 0px,
      var(--scanline) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
    z-index: 4;
    opacity: 0.4;
  }

  /* ── VIGNETTE ── */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(
      ellipse 100% 100% at 50% 50%,
      transparent 55%,
      rgba(0,0,0,0.55) 100%
    );
    pointer-events: none;
    z-index: 5;
  }

  /* ── TERMINAL CONTENT ── */
  .terminal {
    flex: 1;
    padding: 20px 24px 14px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
    z-index: 2;
  }

  .terminal::-webkit-scrollbar { width: 4px; }
  .terminal::-webkit-scrollbar-track { background: transparent; }
  .terminal::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 2px; }

  /* ── TEXT STYLES ── */
  .line {
    font-size: clamp(12px, 1.5vw, 14px);
    line-height: 1.65;
    color: var(--green);
    text-shadow: 0 0 6px var(--green-glow), 0 0 2px var(--green);
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 1.65em;
    letter-spacing: 0.03em;
  }

  .line.dim   { color: var(--green-dim); text-shadow: none; }
  .line.amber { color: var(--amber); text-shadow: 0 0 6px rgba(255,176,0,0.3); }
  .line.error { color: #ff4444; text-shadow: 0 0 6px rgba(255,68,68,0.3); }
  .line.bright { color: #afffaf; text-shadow: 0 0 10px rgba(51,255,51,0.5), 0 0 3px var(--green); }
  .line.separator { color: var(--green-dim); opacity: 0.5; }

  /* ── HEADER BAR ── */
  .term-header {
    padding: 8px 24px;
    border-bottom: 1px solid var(--green-faint);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 2;
  }
  .term-header-left  { font-size: 11px; color: var(--green-dim); letter-spacing: 2px; }
  .term-header-right { font-size: 11px; color: var(--green-dim); font-variant-numeric: tabular-nums; }
  .term-blink { animation: blink 1.1s step-end infinite; }

  /* ── INPUT AREA ── */
  .input-area {
    padding: 6px 24px 16px;
    position: relative;
    z-index: 2;
    border-top: 1px solid var(--green-faint);
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .prompt-label {
    font-size: clamp(11px, 1.4vw, 13px);
    color: var(--green-dim);
    white-space: nowrap;
    letter-spacing: 1px;
    text-shadow: none;
  }

  .prompt-sym {
    color: var(--green);
    font-size: clamp(12px, 1.5vw, 14px);
    text-shadow: 0 0 6px var(--green-glow);
    flex-shrink: 0;
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--green);
    font-family: 'Courier New', Courier, monospace;
    font-size: clamp(12px, 1.5vw, 14px);
    letter-spacing: 0.05em;
    text-shadow: 0 0 6px var(--green-glow), 0 0 2px var(--green);
    caret-color: var(--green);
  }

  #user-input::selection { background: var(--green-dim); color: #000; }

  /* ── CURSOR ── */
  .cursor-block {
    display: inline-block;
    width: 9px;
    height: 1.1em;
    background: var(--green);
    vertical-align: text-bottom;
    animation: blink 0.9s step-end infinite;
    box-shadow: 0 0 6px var(--green-glow);
    margin-left: 1px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  /* ── MONITOR BASE ── */
  .monitor-base {
    height: 68px;
    background: linear-gradient(to bottom, #1a1a1a, #0e0e0e);
    border-radius: 0 0 18px 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding-bottom: 6px;
  }
  .base-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #333;
  }
  .base-dot.power {
    background: #1a5c1a;
    box-shadow: 0 0 4px #33ff33;
    animation: blink 2.5s ease-in-out infinite;
  }

  /* ── FLICKER ANIMATION ── */
  @keyframes flicker {
    0%   { opacity: 1; }
    92%  { opacity: 1; }
    93%  { opacity: 0.85; }
    94%  { opacity: 1; }
    96%  { opacity: 0.9; }
    97%  { opacity: 1; }
    100% { opacity: 1; }
  }
  .screen { animation: flicker 8s infinite; }

  /* ── NOISE TEXTURE ── */
  .noise {
    position: absolute;
    inset: 0;
    opacity: 0.025;
    pointer-events: none;
    z-index: 6;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px;
  }

  /* ── UNLOCK ANIMATION ── */
  @keyframes unlockPulse {
    0%   { box-shadow: inset 0 0 80px rgba(0,0,0,0.6), inset 0 0 20px var(--green-faint), 0 0 20px var(--green-glow); }
    30%  { box-shadow: inset 0 0 80px rgba(0,0,0,0.3), inset 0 0 40px rgba(51,255,51,0.15), 0 0 60px rgba(51,255,51,0.3); }
    100% { box-shadow: inset 0 0 80px rgba(0,0,0,0.6), inset 0 0 20px var(--green-faint), 0 0 20px var(--green-glow); }
  }
  .screen.unlocked { animation: flicker 8s infinite, unlockPulse 1.5s ease-out; }

  /* ── IBM PS/2 POWER BUTTON ── */
  .power-btn-wrap {
    position: relative;
    width: 44px;
    height: 52px;
    margin: 0 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .power-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    position: relative;
    outline: none;
    background: radial-gradient(circle at 38% 34%, #d6d0c4, #a09890 60%, #7a7068);
    box-shadow:
      inset 0 3px 6px rgba(255,255,255,0.35),
      inset 0 -3px 6px rgba(0,0,0,0.45),
      0 3px 8px rgba(0,0,0,0.7),
      0 1px 2px rgba(0,0,0,0.5),
      0 0 0 2px #555,
      0 0 0 3px #888,
      0 0 0 4px #444;
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }

  .power-btn::before {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 30%, #ccc7bc, #918880 55%, #6a6058);
    box-shadow:
      inset 0 2px 4px rgba(255,255,255,0.3),
      inset 0 -2px 4px rgba(0,0,0,0.4);
  }

  /* power symbol: arco + linha vertical desenhados em CSS */
  .power-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    /* linha vertical centrada no topo */
    background:
      linear-gradient(#4a4540, #4a4540) center 26% / 2.5px 9px no-repeat;
    /* arco em radial-gradient — anel incompleto */
    -webkit-mask: none;
    mask: none;
  }

  /* arco desenhado com border em pseudo dentro do botão */
  .power-icon {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    pointer-events: none;
  }

  .power-icon::before {
    content: '';
    display: block;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 2.5px solid #4a4540;
    /* abrir topo para a linha passar */
    clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
    -webkit-mask: linear-gradient(
      to bottom,
      transparent 0px, transparent 5px,
      black 5px, black 100%
    );
    mask: linear-gradient(
      to bottom,
      transparent 0px, transparent 5px,
      black 5px, black 100%
    );
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.15);
    margin-top: 2px;
  }

  .power-icon::after {
    content: '';
    display: block;
    position: absolute;
    width: 2.5px;
    height: 9px;
    background: #4a4540;
    border-radius: 1px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -68%);
    box-shadow: 0 1px 0 rgba(255,255,255,0.15);
  }

  .power-btn:active {
    transform: translateY(2px) scale(0.97);
    box-shadow:
      inset 0 1px 3px rgba(255,255,255,0.15),
      inset 0 -1px 3px rgba(0,0,0,0.3),
      0 1px 3px rgba(0,0,0,0.6),
      0 0 0 2px #555,
      0 0 0 3px #888,
      0 0 0 4px #444;
  }

  .power-led {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #1a5c1a;
    box-shadow: 0 0 5px #33ff33, 0 0 2px #33ff33;
    animation: blink 2.5s ease-in-out infinite;
    border: 1px solid #0a2a0a;
    margin-top: 4px;
  }

  .power-label {
    font-family: 'Courier New', monospace;
    font-size: 7px;
    color: #555;
    letter-spacing: 1.5px;
    margin-top: 2px;
  }

  @keyframes screenOff {
    0%   { opacity: 1; filter: brightness(1); }
    15%  { opacity: 1; filter: brightness(1.6); }
    35%  { opacity: 0.5; filter: brightness(0.3) blur(1px); }
    65%  { opacity: 0.1; filter: brightness(0.05) blur(3px); }
    100% { opacity: 0; filter: brightness(0) blur(8px); }
  }
  .screen.powering-off {
    animation: screenOff 0.6s ease-in forwards !important;
  }
</style>
</head>
<body>

<div class="monitor">
  <div class="bezel">
    <div class="screen" id="screen">
      <div class="noise"></div>
      <div class="vignette"></div>

      <!-- STATUS BAR -->
      <div class="term-header">
        <span class="term-header-left" id="sys-name">ARCHIVUM</span>
        <span class="term-header-right" id="clock-display">--:--:--</span>
      </div>

      <!-- OUTPUT LOG -->
      <div class="terminal" id="terminal"></div>

      <!-- INPUT -->
      <div class="input-area" id="input-area" style="display:none">
        <div class="input-row">
          <span class="prompt-label" id="prompt-label">CÓDIGO DE ACESSO</span>
          <span class="prompt-sym">&nbsp;▶&nbsp;</span>
          <input id="user-input" type="password" autocomplete="off" spellcheck="false" autofocus />
          <span class="cursor-block"></span>
        </div>
      </div>

    </div>
  </div>
  <div class="monitor-base">
    <div class="base-dot"></div>
    <div class="base-dot"></div>
    <div class="power-btn-wrap">
      <button class="power-btn" id="power-btn" title="POWER — reiniciar terminal"><div class="power-icon"></div></button>
      <div class="power-led"></div>
      <span class="power-label">POWER</span>
    </div>
    <div class="base-dot"></div>
    <div class="base-dot"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   CARREGAR CONFIGURAÇÃO DO JSON EMBUTIDO
   Para editar: alterar o bloco <script id="config"> no topo
═══════════════════════════════════════════════════════════ */
const CFG = JSON.parse(document.getElementById('config').textContent.trim());

/* ── Estado ── */
let booting   = false;
let accepting = false;
let typing    = false;
let errorCount = 0;

const terminal   = document.getElementById('terminal');
const inputArea  = document.getElementById('input-area');
const userInput  = document.getElementById('user-input');
const screen     = document.getElementById('screen');
const sysNameEl  = document.getElementById('sys-name');
const promptLbl  = document.getElementById('prompt-label');

/* ── Utilitários ── */
function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

function addLine(text, cls = '', instant = false) {
  const d = document.createElement('div');
  d.className = 'line' + (cls ? ' ' + cls : '');
  d.textContent = text;
  terminal.appendChild(d);
  terminal.scrollTop = terminal.scrollHeight;
  return d;
}

async function typeLine(text, cls = '', charDelay = 28, lineDelay = 0) {
  const d = document.createElement('div');
  d.className = 'line' + (cls ? ' ' + cls : '');
  d.textContent = '';
  terminal.appendChild(d);

  for (const ch of text) {
    d.textContent += ch;
    terminal.scrollTop = terminal.scrollHeight;
    await sleep(charDelay + Math.random() * 18);
  }
  if (lineDelay) await sleep(lineDelay);
  return d;
}

async function typeLines(lines, cls = '', charDelay = 22, lineDelay = 40) {
  for (const line of lines) {
    if (line === '') {
      addLine('', cls);
      await sleep(lineDelay);
    } else {
      await typeLine(line, cls, charDelay, lineDelay);
    }
  }
}

/* ── Clock ── */
function updateClock() {
  const now = new Date();
  document.getElementById('clock-display').textContent =
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0') + ':' +
    String(now.getSeconds()).padStart(2,'0');
}
updateClock();
setInterval(updateClock, 1000);

/* ── Atualizar nome do sistema no header ── */
sysNameEl.textContent = (CFG.sistema || 'TERMINAL').split('//')[0].trim();
promptLbl.textContent = CFG.prompt_label || 'CÓDIGO DE ACESSO';

/* ── BOOT SEQUENCE ── */
async function boot() {
  booting = true;
  await sleep(400);

  /* linha de versão */
  await typeLine(CFG.versao || 'TERMINAL v1.0', 'dim', 18, 120);
  addLine('', 'dim');

  /* mensagens de boot */
  for (const msg of (CFG.boot_msgs || [])) {
    if (msg === '') { addLine(''); await sleep(80); continue; }
    /* simular carregamento em algumas linhas */
    if (msg.includes('VERIFICANDO') || msg.includes('ARQUIVO')) {
      const d = addLine(msg, 'dim');
      await sleep(300);
      d.textContent += ' ';
      for (let i = 0; i < 6; i++) {
        await sleep(180 + Math.random() * 120);
        d.textContent += '█';
        terminal.scrollTop = terminal.scrollHeight;
      }
      await sleep(200);
      d.textContent += ' OK';
    } else {
      await typeLine(msg, 'dim', 14, 60);
    }
  }

  /* linha de sistema */
  addLine('─'.repeat(52), 'separator');
  await sleep(200);
  await typeLine(CFG.sistema || 'SISTEMA SEGURO', 'amber', 20, 100);
  addLine('─'.repeat(52), 'separator');
  await sleep(300);

  await typeLine('INTRODUZA O CÓDIGO DE ACESSO PARA CONTINUAR.', '', 18, 80);
  addLine('');

  /* mostrar input */
  inputArea.style.display = 'block';
  userInput.focus();
  accepting = true;
  booting = false;
}

/* ── VERIFICAR PASSWORD ── */
async function checkPassword(input) {
  if (!accepting || typing) return;
  typing = true;
  accepting = false;
  inputArea.style.display = 'none';

  /* mostrar o que foi digitado (mascarado) */
  const masked = CFG.input_mode === 'password' ? '•'.repeat(input.length) : input;
  addLine('CÓDIGO DE ACESSO ▶  ' + masked, 'dim');
  await sleep(400);

  const passwords = CFG.passwords || [];
  const ok = passwords.some(p =>
    p.localeCompare(input.trim(), undefined, {sensitivity:'accent'}) === 0
  );

  if (ok) {
    /* ── ACESSO CONCEDIDO ── */
    addLine('');
    await sleep(200);

    /* pulsar o ecrã */
    screen.classList.add('unlocked');
    setTimeout(() => screen.classList.remove('unlocked'), 1500);

    /* barra de progresso de autenticação */
    const authLine = addLine('AUTENTICANDO ', 'bright');
    for (let i = 0; i < 20; i++) {
      await sleep(60 + Math.random() * 40);
      authLine.textContent = 'AUTENTICANDO [' + '█'.repeat(i+1) + '░'.repeat(19-i) + ']';
      terminal.scrollTop = terminal.scrollHeight;
    }
    authLine.textContent = 'AUTENTICANDO [████████████████████] COMPLETO';
    await sleep(500);
    addLine('');

    /* resposta linha a linha */
    for (const line of (CFG.resposta || [])) {
      if (line === '') { addLine(''); await sleep(60); continue; }
      if (line.startsWith('─') || line.startsWith('─')) {
        addLine(line, 'separator'); await sleep(80); continue;
      }
      if (line.startsWith('COORDENADAS') || line.startsWith('▶')) {
        await typeLine(line, 'amber', 22, 60);
      } else if (line.startsWith('MENSAGEM') || line.startsWith('[')) {
        await typeLine(line, 'bright', 20, 60);
      } else if (line.startsWith('DESENCRIPTANDO')) {
        await typeLine(line, 'bright', 15, 60);
      } else {
        await typeLine(line, '', 26, 40);
      }
    }

    addLine('');
    addLine('─'.repeat(52), 'separator');
    await typeLine('SESSÃO TERMINADA.', 'dim', 20, 0);

  } else {
    /* ── ACESSO NEGADO ── */
    errorCount++;
    addLine('');
    await sleep(300);

    /* piscar ecrã vermelho */
    screen.style.boxShadow = 'inset 0 0 80px rgba(0,0,0,0.6), inset 0 0 30px rgba(255,50,50,0.12), 0 0 30px rgba(255,50,50,0.2)';
    await sleep(350);
    screen.style.boxShadow = '';

    const errMsgs = CFG.erro_msgs || ['ACESSO NEGADO.', 'CÓDIGO INVÁLIDO.'];
    for (const msg of errMsgs) {
      await typeLine(msg, 'error', 20, 60);
    }

    if (errorCount >= 3) {
      await sleep(300);
      await typeLine('AVISO: ' + errorCount + ' TENTATIVAS FALHADAS.', 'error', 20, 80);
    }

    addLine('');
    await sleep(600);

    /* nova tentativa */
    inputArea.style.display = 'block';
    userInput.value = '';
    userInput.focus();
    accepting = true;
  }

  typing = false;
}

/* ── INPUT HANDLER ── */
userInput.addEventListener('keydown', async (e) => {
  if (e.key === 'Enter') {
    const val = userInput.value;
    userInput.value = '';
    await checkPassword(val);
  }
});

/* ── Focar no ecrã ao clicar ── */
screen.addEventListener('click', () => {
  if (accepting) userInput.focus();
});

/* ── POWER BUTTON ── */
document.getElementById('power-btn').addEventListener('click', async () => {
  if (booting || typing) return;

  // desligar ecrã
  accepting = false;
  screen.classList.add('powering-off');

  await sleep(650);

  // limpar tudo e reiniciar
  screen.classList.remove('powering-off');
  screen.style.opacity = '';
  screen.style.filter  = '';
  terminal.innerHTML   = '';
  inputArea.style.display = 'none';
  userInput.value      = '';
  errorCount           = 0;
  accepting            = false;
  typing               = false;
  booting              = false;

  await sleep(120);
  boot();
});

/* ── ARRANQUE ── */
boot();
</script>
</body>
</html>
